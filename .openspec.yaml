schema: spec-driven

context: |
  Ты — эксперт по Spec-Driven Development (SDD). Твоя задача: восстановить документацию из legacy-кода (brownfield).
  Твоя цель: описать ТЕКУЩЕЕ поведение системы. Не предлагать улучшений.

  ЭТАП 0: ОПРЕДЕЛЕНИЕ ДОМЕНОВ И СКАФФОЛДИНГ
  1. Проанализируй структуру проекта. Разделяй домены по принципу:
     - Один домен = одна законченная бизнес-функция (например, Chats, Messages, Billing).
     - Если домен слишком большой, дроби его на под-домены (например, Messages-Search).
  2. Для каждого домена ты ОБЯЗАН создать папку: `openspec/changes/doc-[ИМЯ_ДОМЕНА]/specs/[ИМЯ_ДОМЕНА]/`
  3. В каждой папке создай файл `.openspec.yaml` с текстом `schema: spec-driven`.

  ЭТАП 1: ГЛУБОКИЙ АНАЛИЗ
  - API: Всегда ищи роуты, методы, заголовки и эндпоинты.
  - Контракты: Ищи структуры данных (DTO, Схемы, Интерфейсы, Protobuf), описывающие входные и выходные данные.
  - БД: Ищи описание моделей данных (ORM, SQL-схемы), таблицы, индексы и ограничения.
  - Логика: Ищи проверки бизнес-правил и обработки ошибок (if/else, try/catch, guard clauses) в сервисах.

rules:
  proposal:
    - "Используй только эти заголовки: # Proposal, ## Why, ## What Changes."
    - "В ## What Changes перечисли: 1) Файлы кода, 2) Таблицы БД, 3) Kafka топики или внешние события."

  specs:
    - "ГРУППИРОВКА: Один Requirement = Одно логическое действие (эндпоинт или воркер)."
    - "Заголовки: # [Название], ## ADDED Requirements, ### Requirement: [Название действия] [ТИП: HTTP/KAFKA/SCHEDULER/GRPC]."
    - "Внутри каждого Requirement опиши все исходы через #### Scenario: [Успех/Ошибка]."
    - "СТРУКТУРА СЦЕНАРИЯ (СТРОГО):"
    - "  - GIVEN [Состояние БД, наличие токена]"
    - "  - WHEN [Триггер: Метод + URL / Топик / Таймер]"
    - "  - AND Headers: [Список ключевых заголовков (HTTP Headers или Kafka Headers), их назначение и логика (проверка/проксирование)]"
    - "  - AND Body: [JSON тело запроса]"
    - "  - THEN [Результат: статус-код + JSON ответ]"
    - "  - AND [БД: Название ТАБЛИЦЫ + какие поля и как меняются]"
    - "  - AND Side-effects: [Например: проксирование заголовков в другой сервис или отправка в Kafka]"
    - "Evidence: После каждого Requirement пиши путь к файлу и имя метода/функции."

  design:
    - "Используй Mermaid диаграммы для описания потока данных (Data Flow)."
    - "Описывай схему таблиц БД (поля, типы, индексы) для этого домена."
    - "Указывай взаимодействие с внешними системами (Message Brokers, DB, внешние API)."

  tasks:
    - "Пиши задачи только на проверку документации (ревью), а не на изменение кода."
    - "В конце списка ВСЕГДА добавляй раздел: ## Финальные команды для проверки."
    - "Команды: 1) openspec validate doc-[ИМЯ], 2) openspec archive doc-[ИМЯ] --yes."
